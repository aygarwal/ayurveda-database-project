<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAYU Local Search</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Ayurveda database</h1>
        <div class="search-box">
            <select id="searchCategory">
                <option value="default">Category</option>
                <option value="plant">Plant Name</option>
                <option value="disease">Disease</option>
                <option value="formulation">Formulation</option>
                <option value="phytochemical">Phytochemical</option>
            </select>
            <input type="text" id="searchInput" placeholder="Enter name...">
            <button id="searchBtn">Get JSON</button>
        </div>

        <div class="result-area">
            <div id="tabHeader" class="tab-container"></div>

            <div id="tabContentContainer"></div>
        </div>
        
        <div id="status"></div>
        
    </div>
    <script src="js/script.js"></script>
</body>
</html>
