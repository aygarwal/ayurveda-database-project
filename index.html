<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAYU Local Search</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Plant Search</h1>
        <div class="search-box">
            <input type="text" id="plantInput" placeholder="Enter plant name (e.g., Moringa)">
            <button id="searchBtn">Get JSON</button>
        </div>
        
        <div id="status"></div>
        
        <div class="result-area">
            <div class="tab-container">
                <button class="tab-btn active" data-tab="phytochemicals">Phytochemicals</button>
                <button class="tab-btn" data-tab="diseases">Diseases</button>
                <button class="tab-btn" data-tab="formulations">Formulations</button>
            </div>

            <div id="phytochemicals" class="tab-content active">
                <table>
                    <thead><tr><th>Phytochemical Name</th></tr></thead>
                    <tbody id="phytoBody"></tbody>
                </table>
            </div>

            <div id="diseases" class="tab-content">
                <table>
                    <thead><tr><th>Disease Name</th></tr></thead>
                    <tbody id="diseaseBody"></tbody>
                </table>
            </div>

            <div id="formulations" class="tab-content">
                <table>
                    <thead><tr><th>Formulation Name</th></tr></thead>
                    <tbody id="formBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
